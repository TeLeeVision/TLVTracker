
<style>

.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.5rem}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px}

.toolbar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.filter-btn{font-size:12px;padding:4px 12px;border:0.5px solid var(--color-border-tertiary);border-radius:12px;background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer}

.flex-gap{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
select{font-size:12px;padding:4px 8px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-secondary)}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);margin-bottom:8px;overflow:hidden}

.prog-wrap{min-width:100px;flex:1;max-width:140px}

.prog-fill.done-fill{background:#639922}
.prog-fill.late-fill{background:#E24B4A}
.prog-pct{font-size:11px;color:var(--color-text-tertiary);margin-top:2px;text-align:right}
.chevron{font-size:11px;color:var(--color-text-tertiary);transition:transform .2s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}
.card-body{border-top:0.5px solid var(--color-border-tertiary);display:none}
.card-body.open{display:block}
.tabs{display:flex;border-bottom:0.5px solid var(--color-border-tertiary)}
.tab{padding:8px 14px;font-size:12px;color:var(--color-text-secondary);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}

.task-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--color-border-tertiary)}

.chk{width:15px;height:15px;border:0.5px solid var(--color-border-secondary);border-radius:3px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px}

let state = {};
let team = [{name:'Leegion',role:'Network Director',initials:'LE'},{name:'TBC',role:'Content Lead',initials:'CL'},{name:'TBC',role:'Social Media',initials:'SM'},{name:'TBC',role:'Videographer',initials:'VG'}];
let openCards = {};
let activeCardTab = {};
let divFilter = 'all';
let currentView = 'divisions';

function init() {
  divisions.forEach(d=>{
    state[d.id]={tasks:d.tasks.map(()=>({done:false,assignee:'',due:''})),note:'',files:[]};
  });
  renderAll();
}

function initials(name){return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}

function showView(v,btn){
  currentView=v;
  ['divisions','team','timeline','performance'].forEach(n=>{
    document.getElementById('view-'+n).style.display=n===v?'block':'none';
  });
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function setDivFilter(f,btn){
  divFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderDivisions();
}

function progress(id){
  const t=state[id].tasks;
  const done=t.filter(x=>x.done).length;
  return t.length?Math.round(done/t.length*100):0;
}

function isOverdue(id){
  const today=new Date();
  return state[id].tasks.some(t=>!t.done&&t.due&&new Date(t.due)<today);
}

function hasUnassigned(id){
  return state[id].tasks.some(t=>!t.done&&!t.assignee);
}

function dueClass(due,done){
  if(!due) return '';
  const today=new Date();
  const d=new Date(due);
  const diff=(d-today)/(1000*60*60*24);
  if(done) return 'due-ok';
  if(diff<0) return 'due-late';
  if(diff<7) return 'due-warn';
  return 'due-ok';
}

function dueLabel(due,done){
  if(!due) return '';
  const today=new Date();
  const d=new Date(due);
  const diff=Math.round((d-today)/(1000*60*60*24));
  if(done) return 'Done';
  if(diff<0) return `${Math.abs(diff)}d overdue`;
  if(diff===0) return 'Due today';
  return `${diff}d left`;
}

function statusDot(id){
  const p=progress(id);
  if(p===100) return 'dot-done';
  if(isOverdue(id)) return 'dot-late';
  if(p>0) return 'dot-ip';
  return 'dot-not';
}

function progFillClass(id){
  const p=progress(id);
  if(p===100) return 'done-fill';
  if(isOverdue(id)) return 'late-fill';
  return '';
}

function renderAll(){
  renderStats();
  if(currentView==='divisions') renderDivisions();
  if(currentView==='team') renderTeam();
  if(currentView==='timeline') renderTimeline();
  if(currentView==='performance') renderPerformance();
}

function renderStats(){
  let total=divisions.length,inprog=0,done=0,overdue=0,unassigned=0;
  divisions.forEach(d=>{
    const p=progress(d.id);
    if(p===100) done++;
    else if(p>0) inprog++;
    if(isOverdue(d.id)) overdue++;
    if(hasUnassigned(d.id)) unassigned++;
  });
  document.getElementById('top-stats').innerHTML=`
    <div class="stat"><div class="stat-l">Divisions</div><div class="stat-v">${total}</div></div>
    <div class="stat"><div class="stat-l">In progress</div><div class="stat-v accent">${inprog}</div></div>
    <div class="stat"><div class="stat-l">Overdue tasks</div><div class="stat-v" style="color:${overdue?'#E24B4A':'var(--color-text-primary)'}">${overdue}</div></div>
    <div class="stat"><div class="stat-l">Unassigned</div><div class="stat-v" style="color:${unassigned?'#BA7517':'var(--color-text-primary)'}">${unassigned}</div></div>
  `;
}

function renderDivisions(){
  const filtered=divisions.filter(d=>{
    if(divFilter==='all') return true;
    if(divFilter==='overdue') return isOverdue(d.id);
    if(divFilter==='unassigned') return hasUnassigned(d.id);
    return d.phase===divFilter;
  });
  const phLabel={p1:'Phase 1',p2:'Phase 2',p3:'Phase 3'};
  document.getElementById('div-cards').innerHTML=filtered.map(d=>{
    const p=progress(d.id);
    const s=state[d.id];
    const isOpen=!!openCards[d.id];
    const tab=activeCardTab[d.id]||'tasks';
    const teamOptions=`<option value="">Unassigned</option>${team.map(m=>`<option value="${m.name}">${m.name}</option>`).join('')}`;
    const tasksHtml=d.tasks.map((t,i)=>{
      const ts=s.tasks[i];
      const dc=dueClass(ts.due,ts.done);
      const dl=dueLabel(ts.due,ts.done);
      return `<div class="task-row">
        <div class="chk${ts.done?' done':''}" onclick="toggleTask('${d.id}',${i})"></div>
        <div class="task-main">
          <div class="task-text${ts.done?' done':''}">${t.text}</div>
          <div class="task-meta">
            <select class="assign-select" onchange="setAssignee('${d.id}',${i},this.value)">
              ${teamOptions.replace(`value="${ts.assignee}"`,`value="${ts.assignee}" selected`)}
            </select>
            ${ts.assignee?`<span class="assignee-badge">${ts.assignee}</span>`:''}
            <input type="date" class="date-input" value="${ts.due||''}" onchange="setDue('${d.id}',${i},this.value)">
            ${dl?`<span class="due-badge ${dc}">${dl}</span>`:''}
          </div>
        </div>
      </div>`;
    }).join('');
    return `<div class="card" id="card-${d.id}">
      <div class="card-header" onclick="toggleCard('${d.id}')">
        <div class="status-dot ${statusDot(d.id)}"></div>
        <div class="card-name">${d.name} <span style="font-size:11px;color:var(--color-text-tertiary);font-weight:400">${d.focus}</span></div>
        <div class="pill ${d.phase}">${phLabel[d.phase]}</div>
        <div class="prog-wrap">
          <div class="prog-bg"><div class="prog-fill ${progFillClass(d.id)}" style="width:${p}%"></div></div>
          <div class="prog-pct">${p}%</div>
        </div>
        <div class="chevron${isOpen?' open':''}">▾</div>
      </div>
      <div class="card-body${isOpen?' open':''}">
        <div class="tabs">
          <div class="tab${tab==='tasks'?' active':''}" onclick="setCardTab('${d.id}','tasks')">Tasks</div>
          <div class="tab${tab==='info'?' active':''}" onclick="setCardTab('${d.id}','info')">Info</div>
          <div class="tab${tab==='notes'?' active':''}" onclick="setCardTab('${d.id}','notes')">Notes</div>
        </div>
        <div class="tab-panel${tab==='tasks'?' active':''}">
          ${tasksHtml}
        </div>
        <div class="tab-panel${tab==='info'?' active':''}">
          <div class="kpi-grid">${d.kpi.map((k,i)=>`<div class="kpi-cell"><div class="kpi-l">Target ${i+1}</div><div class="kpi-v">${k}</div></div>`).join('')}</div>
          <div class="rev-bar">Revenue path: ${d.rev}</div>
        </div>
        <div class="tab-panel${tab==='notes'?' active':''}">
          <textarea class="note-area" rows="3" placeholder="Notes, links, updates..." oninput="saveNote('${d.id}',this.value)">${s.note}</textarea>
        </div>
      </div>
    </div>`;
  }).join('') || '<div class="empty">No divisions match this filter</div>';
}

function renderTeam(){
  const workload={};
  team.forEach(m=>{workload[m.name]={total:0,done:0}});
  divisions.forEach(d=>{
    state[d.id].tasks.forEach(t=>{
      if(t.assignee&&workload[t.assignee]){
        workload[t.assignee].total++;
        if(t.done) workload[t.assignee].done++;
      }
    });
  });
  document.getElementById('team-list').innerHTML=team.map((m,i)=>`
    <div class="member-row">
      <div class="avatar">${initials(m.name)}</div>
      <div style="flex:1">
        <div class="member-name">${m.name}</div>
        <div style="font-size:12px;color:var(--color-text-secondary)">${m.role}</div>
      </div>
      <div class="member-tasks">${workload[m.name]?workload[m.name].total:0} tasks</div>
      <button class="btn-sm" style="font-size:11px;padding:3px 8px;color:var(--color-text-danger);border-color:var(--color-border-danger)" onclick="removeMember(${i})">Remove</button>
    </div>
  `).join('') || '<div class="empty">No team members yet</div>';

  document.getElementById('workload-list').innerHTML=team.map(m=>{
    const w=workload[m.name]||{total:0,done:0};
    const pct=w.total?Math.round(w.done/w.total*100):0;
    return `<div class="member-row">
      <div class="avatar">${initials(m.name)}</div>
      <div class="member-name">${m.name}</div>
      <div style="font-size:12px;color:var(--color-text-secondary);min-width:80px">${w.done}/${w.total} done</div>
      <div class="perf-bar-bg"><div class="perf-bar-fill" style="width:${pct}%"></div></div>
      <div style="font-size:12px;color:var(--color-text-secondary);min-width:32px;text-align:right">${pct}%</div>
    </div>`;
  }).join('') || '<div class="empty">Add team members to see workload</div>';
}

function renderTimeline(){
  const slots=12;
  document.getElementById('gantt-rows').innerHTML=divisions.map(d=>{
    const [start,end]=d.gantt;
    const p=progress(d.id);
    const late=isOverdue(d.id);
    const left=Math.round(start/slots*100);
    const width=Math.round((end-start)/slots*100);
    const barClass=p===100?'done-bar':late?'late-bar':'';
    return `<div class="gantt-row">
      <div class="gantt-label" title="${d.name}">${d.name}</div>
      <div class="gantt-track">
        <div class="gantt-bar ${barClass}" style="left:${left}%;width:${width}%;opacity:${p>0?1:.45}"></div>
      </div>
      <div style="font-size:11px;color:var(--color-text-tertiary);min-width:32px;text-align:right">${p}%</div>
    </div>`;
  }).join('');
}

function renderPerformance(){
  let totalTasks=0,doneTasks=0,assigned=0,withDue=0,overdueTasks=0;
  const byMember={};
  divisions.forEach(d=>{
    state[d.id].tasks.forEach(t=>{
      totalTasks++;
      if(t.done) doneTasks++;
      if(t.assignee) assigned++;
      if(t.due) withDue++;
      if(!t.done&&t.due&&new Date(t.due)<new Date()) overdueTasks++;
      if(t.assignee){
        if(!byMember[t.assignee]) byMember[t.assignee]={total:0,done:0,overdue:0};
        byMember[t.assignee].total++;
        if(t.done) byMember[t.assignee].done++;
        if(!t.done&&t.due&&new Date(t.due)<new Date()) byMember[t.assignee].overdue++;
      }
    });
  });
  const overallPct=totalTasks?Math.round(doneTasks/totalTasks*100):0;
  document.getElementById('perf-content').innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.5rem">
      <div class="stat"><div class="stat-l">Overall progress</div><div class="stat-v">${overallPct}%</div></div>
      <div class="stat"><div class="stat-l">Tasks completed</div><div class="stat-v accent">${doneTasks}/${totalTasks}</div></div>
      <div class="stat"><div class="stat-l">Assigned tasks</div><div class="stat-v">${assigned}</div></div>
      <div class="stat"><div class="stat-l">Overdue tasks</div><div class="stat-v" style="color:${overdueTasks?'#E24B4A':'var(--color-text-primary)'}">${overdueTasks}</div></div>
    </div>
    <div class="section-lbl">Division completion</div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:1.5rem">
      ${divisions.map(d=>{
        const p=progress(d.id);
        const late=isOverdue(d.id);
        return `<div style="display:flex;align-items:center;gap:10px">
          <div style="font-size:12px;color:var(--color-text-secondary);min-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${d.name}</div>
          <div class="prog-bg" style="flex:1;max-width:none;height:6px">
            <div class="prog-fill ${p===100?'done-fill':late?'late-fill':''}" style="width:${p}%;height:6px"></div>
          </div>
          <div style="font-size:12px;color:var(--color-text-secondary);min-width:36px;text-align:right">${p}%</div>
        </div>`;
      }).join('')}
    </div>
    <div class="section-lbl">Individual performance</div>
    <div>
      ${Object.keys(byMember).length?Object.entries(byMember).map(([name,w])=>{
        const pct=w.total?Math.round(w.done/w.total*100):0;
        return `<div class="member-row">
          <div class="avatar">${initials(name)}</div>
          <div style="flex:1">
            <div class="member-name">${name}</div>
            <div style="font-size:12px;color:var(--color-text-secondary)">${w.done}/${w.total} tasks · ${w.overdue} overdue</div>
          </div>
          <div class="perf-bar-bg" style="max-width:160px"><div class="perf-bar-fill" style="width:${pct}%"></div></div>
          <div style="font-size:12px;font-weight:500;color:var(--color-text-primary);min-width:36px;text-align:right">${pct}%</div>
        </div>`;
      }).join(''):'<div class="empty">Assign tasks to team members to see individual performance</div>'}
    </div>
  `;
}

function toggleCard(id){openCards[id]=!openCards[id];if(!activeCardTab[id])activeCardTab[id]='tasks';renderDivisions();}
function setCardTab(id,tab){activeCardTab[id]=tab;renderDivisions();}
function toggleTask(id,i){state[id].tasks[i].done=!state[id].tasks[i].done;renderAll();}
function setAssignee(id,i,val){state[id].tasks[i].assignee=val;renderAll();}
function setDue(id,i,val){state[id].tasks[i].due=val;renderAll();}
function saveNote(id,val){state[id].note=val;}
function addMember(){
  const n=document.getElementById('new-member-name').value.trim();
  const r=document.getElementById('new-member-role').value.trim();
  if(!n) return;
  team.push({name:n,role:r||'Team member',initials:initials(n)});
  document.getElementById('new-member-name').value='';
  document.getElementById('new-member-role').value='';
  renderTeam();
}
function removeMember(i){
  const name=team[i].name;
  team.splice(i,1);
  divisions.forEach(d=>{state[d.id].tasks.forEach(t=>{if(t.assignee===name)t.assignee='';});});
  renderAll();
}

init();
</script>
